name: Build FIZUX APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - uses: android-actions/setup-android@v3

      - name: Setup structure and build
        run: |
          mkdir -p app/src/main/java/com/fizux/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-hdpi

          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
          [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/fizux/app/
          [ -f strings.xml ] && mv strings.xml app/src/main/res/values/
          [ -f styles.xml ] && mv styles.xml app/src/main/res/values/
          [ -f network_security_config.xml ] && mv network_security_config.xml app/src/main/res/xml/
          [ -f ic_launcher.png ] && mv ic_launcher.png app/src/main/res/mipmap-hdpi/

          echo "=== Project structure ==="
          find . -name "*.gradle" | head -10
          find . -name "*.java" | head -10
          echo "=== app/build.gradle ==="
          cat app/build.gradle

          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: FIZUX-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
