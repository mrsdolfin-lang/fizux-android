name: Build FIZUX APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: zulu

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Create Icons
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          python3 - << PYEOF
import struct, zlib

def make_png(size):
    r, g, b = 201, 168, 76
    raw = b""
    for y in range(size):
        raw += b"\x00"
        for x in range(size):
            raw += bytes([r, g, b])
    compressed = zlib.compress(raw, 9)
    def chunk(t, d):
        c = t + d
        return struct.pack(">I", len(d)) + c + struct.pack(">I", zlib.crc32(c) & 0xffffffff)
    sig = b"\x89\x50\x4e\x47\x0d\x0a\x1a\x0a"
    ihdr = chunk(b"IHDR", struct.pack(">II", size, size) + b"\x08\x02\x00\x00\x00")
    idat = chunk(b"IDAT", compressed)
    iend = chunk(b"IEND", b"")
    return sig + ihdr + idat + iend

for folder, size in [("mipmap-mdpi",48),("mipmap-hdpi",72),("mipmap-xhdpi",96),("mipmap-xxhdpi",144)]:
    with open(f"app/src/main/res/{folder}/ic_launcher.png", "wb") as f:
        f.write(make_png(size))
    print(f"Created {folder}/ic_launcher.png")
PYEOF

      - name: Build APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: FIZUX-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
