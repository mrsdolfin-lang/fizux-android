name: Build FIZUX APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APK
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          python3 -c "
import struct,zlib
def png(s):
    r,g,b=201,168,76
    raw=b''.join(b'\x00'+bytes([r,g,b]*s) for _ in range(s))
    def c(n,d):
        x=n+d
        return struct.pack('>I',len(d))+x+struct.pack('>I',zlib.crc32(x)&0xffffffff)
    return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',s,s,8,2,0,0,0))+c(b'IDAT',zlib.compress(raw))+c(b'IEND',b'')
import os
for f,s in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144)]:
    open(f'app/src/main/res/{f}/ic_launcher.png','wb').write(png(s))
print('Icons created')
"
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: FIZUX-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
